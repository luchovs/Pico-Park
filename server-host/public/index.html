<!doctype html>
<html>
  <head>
    <title>Pico Park Host</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #222;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
      const socket = io();

      // Configuración visual local
      const engine = Matter.Engine.create();
      const render = Matter.Render.create({
        element: document.body,
        engine: engine,
        options: { width: 800, height: 600, wireframes: false },
      });

      // Suelo estático
      const ground = Matter.Bodies.rectangle(400, 580, 810, 60, {
        isStatic: true,
      });
      Matter.Composite.add(engine.world, ground);
      Matter.Render.run(render);

      const playerRenders = {};

      socket.on("stateUpdate", (players) => {
        players.forEach((p) => {
          if (!playerRenders[p.id]) {
            // Si el jugador es nuevo, creamos su cuadrado visual
            playerRenders[p.id] = Matter.Bodies.rectangle(p.x, p.y, 40, 40, {
              render: { fillStyle: p.color },
            });
            Matter.Composite.add(engine.world, playerRenders[p.id]);
          } else {
            // Actualizamos posición según lo que dice el servidor
            Matter.Body.setPosition(playerRenders[p.id], { x: p.x, y: p.y });
          }
        });

        // Limpieza: si un jugador se desconecta, borrar su cuadrado
        const activeIds = players.map((p) => p.id);
        Object.keys(playerRenders).forEach((id) => {
          if (!activeIds.includes(id)) {
            Matter.Composite.remove(engine.world, playerRenders[id]);
            delete playerRenders[id];
          }
        });
      });
    </script>
  </body>
</html>
